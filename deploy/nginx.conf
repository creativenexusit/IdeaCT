server {
    listen 80;
    server_name ideact.example.com;

    # Redirect all HTTP traffic to HTTPS once Let's Encrypt is configured.
    # (Comment out this block until certbot has issued a real certificate,
    # or certbot --nginx will manage this automatically.)
    # return 301 https://$host$request_uri;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # Next.js static assets — long cache, immutable (content-hashed filenames).
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /public/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    client_max_body_size 25M; # allow PDF/document uploads up to the Phase 10 20MB limit
}

# After running: sudo certbot --nginx -d ideact.example.com
# certbot will rewrite this file to add the HTTPS server block and the
# HTTP->HTTPS redirect automatically.
